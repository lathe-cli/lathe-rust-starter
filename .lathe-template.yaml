schema_version: 1
language: rust
defaults:
  app_name: CLI-first Rust app
  app_slug: cli-first-rust-app
  cli_name: appctl
  go_module: example.com/cli-first-rust-app
  lathe_version: v0.4.4
replacements:
  - variable: app_name
    files: [README.md]
  - variable: app_name
    from: CLI-first Rust application
    files: [openapi/openapi.yaml]
  - variable: app_slug
    files: [Cargo.toml, Cargo.lock]
  - variable: package_ident
    from: cli_first_rust_app
    files: [src/main.rs, tests/cli.rs]
  - variable: cli_name
    files: [.github/workflows/ci.yml, AGENTS.md, Makefile, README.md, cli.yaml, cmd/appctl/cli.yaml, tests/cli.rs]
  - variable: go_module
    files: [go.mod, cmd/appctl/main.go]
  - variable: lathe_version
    files: [go.mod, Makefile]
renames:
  - from: cmd/appctl
    variable: cli_name
generated: [internal/generated, skills/appctl]
cleanup: [.cache, bin, target]
check_profile: make
