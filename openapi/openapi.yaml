openapi: 3.0.3
info:
  title: CLI-first Rust application
  version: 0.1.0
servers:
  - url: http://127.0.0.1:3000
paths:
  /health:
    get:
      operationId: Health_Get
      tags: [Health]
      summary: Check application health
      security: []
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /tasks:
    get:
      operationId: Task_List
      tags: [Tasks]
      summary: List tasks
      security: []
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: Task_Create
      tags: [Tasks]
      summary: Create a task
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTask"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: Task_Get
      tags: [Tasks]
      summary: Get a task
      security: []
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: Task_Update
      tags: [Tasks]
      summary: Update a task
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTask"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: Task_Delete
      tags: [Tasks]
      summary: Delete a task
      security: []
      responses:
        "204":
          description: Task deleted
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Task:
      type: object
      required: [id, title, completed]
      properties:
        id:
          type: string
        title:
          type: string
        completed:
          type: boolean
    CreateTask:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
    UpdateTask:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
